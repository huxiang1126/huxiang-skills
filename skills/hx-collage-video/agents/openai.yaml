interface:
  display_name: "HX Collage Video Director"
  short_description: "生成视频与动态透明图层并行的人物行动故事视频"
  default_prompt: "Use $hx-collage-video in story mode to research this topic, build a single lifecycle beat ledger, and choose per beat among visible first/last-frame video controls, first-image video, editable transparent-PNG timeline collage, and native HyperFrames motion. For every timeline-collage scene, author a motion plan with enter, settle, in-clip life/action, event reaction, and exit or explicit handoff; use causal scene effects and a restrained motion budget instead of generic perpetual motion. Use an authorized Chinese narration route, directed captions, and action-linked sound. Default to no background music unless I explicitly request it. Run ledger, motion, caption-occlusion, audio, and final-master evidence QA before describing what survived in the MP4; if a nontechnical gate fails, label the result as a draft or explicitly accepted degraded delivery rather than passed."
